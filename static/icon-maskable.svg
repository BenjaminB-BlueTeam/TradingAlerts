<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1F2433"/>
      <stop offset="100%" stop-color="#0B0D14"/>
    </radialGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="55%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="ballShade" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="75%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </radialGradient>
    <filter id="boltGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <g transform="translate(256 268) scale(0.78)">
    <ellipse cx="6" cy="148" rx="115" ry="14" fill="#000" opacity="0.35"/>
    <circle r="148" fill="url(#ballShade)" stroke="#0F1117" stroke-width="3"/>
    <polygon points="0,-58 55.2,-17.9 34.1,47 -34.1,47 -55.2,-17.9"
             fill="#0F1117" stroke="#0F1117" stroke-width="2" stroke-linejoin="round"/>
    <g stroke="#0F1117" stroke-width="6" stroke-linecap="round" fill="none">
      <line x1="0" y1="-58" x2="0" y2="-138"/>
      <line x1="55.2" y1="-17.9" x2="131" y2="-42.5"/>
      <line x1="34.1" y1="47" x2="81" y2="111.6"/>
      <line x1="-34.1" y1="47" x2="-81" y2="111.6"/>
      <line x1="-55.2" y1="-17.9" x2="-131" y2="-42.5"/>
    </g>
  </g>

  <g filter="url(#boltGlow)" transform="translate(256 268) scale(0.78) translate(-256 -268)">
    <path d="M 354 58
             L 196 252
             L 268 252
             L 158 458
             L 332 270
             L 254 270
             Z"
          fill="url(#bolt)"
          stroke="#7C2D12"
          stroke-width="6"
          stroke-linejoin="round"
          stroke-linecap="round"/>
  </g>
