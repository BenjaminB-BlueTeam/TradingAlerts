<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FHG Tracker — Trading Sportif</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="src/css/main.css" />
  <link rel="stylesheet" href="src/css/components.css" />
  <link rel="stylesheet" href="src/css/responsive.css" />
</head>
<body>

  <!-- Bandeau mode démo -->
  <div id="demo-banner" class="demo-banner hidden">
    <span>⚠️ Mode démonstration — Configurez votre clé API dans <a href="#" data-page="settings">Paramètres</a></span>
    <button class="demo-banner__close" id="demo-banner-close">✕</button>
  </div>

  <!-- Layout principal -->
  <div class="app-layout">

    <!-- Overlay menu mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <div class="sidebar__logo">
          <span class="sidebar__logo-icon">⚽</span>
          <span class="sidebar__logo-text">FHG Tracker</span>
        </div>
        <button class="sidebar__close-btn" id="sidebar-close-btn">✕</button>
      </div>

      <nav class="sidebar__nav" id="sidebar-nav">
        <a href="#" class="sidebar__nav-item active" data-page="dashboard">
          <span class="sidebar__nav-icon">📊</span>
          <span class="sidebar__nav-label">Dashboard</span>
        </a>
        <a href="#" class="sidebar__nav-item" data-page="matches">
          <span class="sidebar__nav-icon">🗓</span>
          <span class="sidebar__nav-label">Matchs à venir</span>
        </a>
        <a href="#" class="sidebar__nav-item" data-page="leagues">
          <span class="sidebar__nav-icon">🏆</span>
          <span class="sidebar__nav-label">Ligues actives</span>
        </a>
        <a href="#" class="sidebar__nav-item" data-page="alerts">
          <span class="sidebar__nav-icon">🔔</span>
          <span class="sidebar__nav-label">Alertes</span>
          <span class="sidebar__badge" id="alerts-badge" style="display:none"></span>
        </a>
        <a href="#" class="sidebar__nav-item" data-page="settings">
          <span class="sidebar__nav-icon">⚙️</span>
          <span class="sidebar__nav-label">Paramètres</span>
        </a>
      </nav>

      <div class="sidebar__footer">
        <div class="sidebar__api-status">
          <span class="api-dot" id="api-status-dot"></span>
          <span class="api-status-label" id="api-status-label">Non connecté</span>
        </div>
        <button class="btn btn--danger btn--pause" id="pause-session-btn">
          ⏸ PAUSE SESSION
        </button>
      </div>
    </aside>

    <!-- CONTENU PRINCIPAL -->
    <main class="main-content" id="main-content">

      <!-- Topbar mobile -->
      <div class="topbar">
        <button class="burger-btn" id="burger-btn">☰</button>
        <span class="topbar__title" id="topbar-title">Dashboard</span>
        <div class="topbar__right">
          <span class="api-dot" id="api-status-dot-mobile"></span>
        </div>
      </div>

      <!-- Conteneur des pages -->
      <div class="page-container" id="page-container">
        <!-- Chargé dynamiquement par app.js -->
        <div class="page-loading">
          <div class="spinner"></div>
          <p>Chargement…</p>
        </div>
      </div>

    </main>
  </div>

  <!-- Modal global -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal__header">
        <h3 class="modal__title" id="modal-title">Titre</h3>
        <button class="modal__close" id="modal-close">✕</button>
      </div>
      <div class="modal__body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- App JS (modules) -->
  <script type="module" src="src/js/app.js"></script>

</body>
</html>
