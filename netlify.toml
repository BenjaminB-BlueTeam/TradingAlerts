[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = "netlify/functions"

[functions."generate-alerts"]
  schedule = "0 6,16 * * *"

[functions."daily-seed"]
  schedule = "0 4 * * *"

[functions."compute-team-lg1"]
  schedule = "0 5 * * *"

[functions."notify-pre-kickoff"]
  schedule = "*/5 * * * *"

[functions."notify-daily-summary"]
  schedule = "0 9 * * *"
